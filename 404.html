<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Page Not Found — Tarumak Studio</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/main.css">
  <style>
    .err-body{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px}
    .err-code{font-family:var(--fd);font-size:clamp(72px,15vw,120px);font-weight:700;letter-spacing:-4px;background:linear-gradient(120deg,#22d3ee,#6366f1);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;margin-bottom:16px}
    .err-title{font-family:var(--fd);font-size:24px;font-weight:600;color:var(--text);margin-bottom:10px}
    .err-sub{font-size:15px;color:var(--text-dim);margin-bottom:32px;max-width:440px}
    .err-links{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
    .err-links a{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:500;text-decoration:none;transition:.2s}
    .btn-home{background:var(--grad);color:#06121a}
    .btn-tool{background:var(--surface);color:var(--text);border:1px solid var(--border)}
    .btn-tool:hover{border-color:var(--p1)}
  </style>
</head>
<body>
<header style="position:sticky;top:0;z-index:99;background:rgba(12,17,26,.9);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06);padding:0 24px">
  <div style="max-width:1200px;margin:0 auto;display:flex;align-items:center;height:64px">
    <a href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none">
      <img src="/favicon.svg" width="32" height="32" alt="Tarumak Studio">
      <span style="font-family:Space Grotesk,sans-serif;font-size:16px;font-weight:700;color:#f1f5f9">Tarumak <span style="color:#94a3b8;font-weight:400">Studio</span></span>
    </a>
  </div>
</header>
<main class="err-body">
  <div class="err-code">404</div>
  <h1 class="err-title">Page not found</h1>
  <p class="err-sub">The page you are looking for does not exist or has been moved. Try one of these instead.</p>
  <div class="err-links">
    <a href="/" class="err-links btn-home">Go to homepage</a>
    <a href="/image-tools" class="err-links btn-tool">Image Tools</a>
    <a href="/pdf-tools" class="err-links btn-tool">PDF Tools</a>
    <a href="/marketing-tools" class="err-links btn-tool">Marketing Tools</a>
  </div>
</main>
<footer style="border-top:1px solid rgba(255,255,255,.06);padding:24px;text-align:center">
  <p style="font-size:13px;color:#64748b">&copy; 2026 Tarumak Studio</p>
</footer>
</body>
</html>
