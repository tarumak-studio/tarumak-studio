    <h1 style="font-family:Space Grotesk,sans-serif;font-size:clamp(28px,5vw,44px);font-weight:700;letter-spacing:-1.5px;margin-bottom:14px;color:#f1f5f9">Blog &amp; Guides</h1>

    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px">

<script src="/blog-data.js"></script>
<script>
(function(){
  var grid = document.getElementById('blog-grid');
  if(!grid) return;
  if(typeof ARTICLES === 'undefined' || Object.keys(ARTICLES).length === 0){
    grid.innerHTML = '<p style="color:#475569">No articles found.</p>';
    return;
  }
  var slugs = Object.keys(ARTICLES);
  var catColors = {
    'Image Tools':'#22d3ee','PDF Tools':'#6366f1',
    'Marketing Designer':'#ec4899','Converter Tools':'#f59e0b',
    'Developer Tools':'#22c55e'
  };
  grid.innerHTML = slugs.map(function(slug){
    var a = ARTICLES[slug];
    var color = catColors[a.cat] || '#22d3ee';
    var href = '/#/blog/' + slug;
    return [
      '<a href="' + href + '" class="blog-card" style="text-decoration:none;display:flex;flex-direction:column">',
        '<div style="padding:18px 18px 10px">',
          '<span class="bc-cat" style="color:' + color + '">' + (a.cat || 'Guide') + '</span>',
          '<h3 style="margin-top:8px">' + a.title + '</h3>',
        '</div>',
        '<p>' + a.excerpt + '</p>',
        '<div class="bc-meta">',
          '<span>' + a.date + '</span>',
          '<span>' + a.read + ' read</span>',
        '</div>',
      '</a>'
    ].join('');
  }).join('');
})();
</script>
</body>
